<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Transit Flow: Bus & Metro</title>
    <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Game Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- UI Overlay -->
    <div id="ui-layer" class="flex flex-col h-screen justify-between p-4 pb-safe">
        <!-- Top Bar -->
        <div class="flex justify-between items-start">
            <div class="bg-white/90 backdrop-blur shadow-md rounded-xl p-3 md:p-4 pointer-events-auto flex gap-4 md:gap-6 items-center border border-gray-100 max-w-[80%] md:max-w-none">
                <div>
                    <h1 class="text-lg md:text-xl font-bold text-gray-800 leading-tight">Transit Flow</h1>
                    <div class="text-xs md:text-sm font-medium flex gap-3 mt-1">
                        <span class="text-indigo-600 font-bold">Score: <span id="scoreDisplay">0</span></span>
                        <span class="text-yellow-600 font-bold">Coins: <span id="coinDisplay">0</span></span>
                    </div>
                </div>
            </div>

            <button onclick="clearLines()" class="pointer-events-auto bg-white/90 backdrop-blur shadow-sm hover:bg-red-50 text-red-600 px-3 py-2 rounded-lg text-xs md:text-sm font-bold border border-red-100 transition-all select-none touch-none">
                Clear All Lines
            </button>
        </div>

        <!-- Left Side Vertical Control Bar -->
        <div class="absolute left-2 md:left-5 top-1/2 -translate-y-1/2 bg-white/85 backdrop-blur-md shadow-lg rounded-2xl p-2 border border-white/70 pointer-events-auto flex flex-col items-center gap-2 min-w-[56px]" id="controlsContainer" style="touch-action: none;">
            <!-- Active Indicator Dot (floating to the left of the active selection) -->
            <div id="activeIndicatorDot" class="absolute -left-2 w-2.5 h-2.5 bg-slate-800 rounded-full transition-all duration-300 transform -translate-y-1/2"></div>

            <!-- Add Carrier/Vehicle Tool Button (Aligned directly above Metro for easy association) -->
            <button id="btnVehicle" aria-label="Add carrier" title="Add carrier" class="order-6 relative group w-10 h-10 rounded-full flex items-center justify-center transition-all hover:scale-105 touch-none select-none">
                <div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-slate-850 text-slate-700 bg-slate-100 flex items-center justify-center shadow-sm hover:bg-slate-200">
                    <svg class="w-5 h-5 md:w-6 md:h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="7" width="13" height="9" rx="1.5" />
                        <circle cx="5" cy="18" r="1.5" fill="currentColor"/>
                        <circle cx="12" cy="18" r="1.5" fill="currentColor"/>
                        <line x1="15" y1="11" x2="18" y2="11" />
                        <path d="M19 4v4M17 6h4" stroke="#22c55e" stroke-width="2.5"/>
                    </svg>
                </div>
                <span id="vehicleCount" class="absolute -top-1 -right-1 bg-slate-500 text-white text-[9px] font-black w-4 h-4 md:w-5 md:h-5 flex items-center justify-center rounded-full border-2 border-white shadow-sm">0</span>
            </button>

            <!-- Metro Tool Button -->
            <button id="btnMetro" aria-label="Draw metro line" title="Metro line" class="order-1 relative group w-10 h-10 rounded-full flex items-center justify-center transition-all hover:scale-105 touch-none select-none">
                <div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-slate-800 text-white flex items-center justify-center shadow-md">
                    <svg class="w-5 h-5 md:w-6 md:h-6" viewBox="0 0 24 24" fill="currentColor">
                        <!-- Polished front-facing high-speed subway train matching Screenshot 2.36.38 -->
                        <path d="M12 2c-4.5 0-6.5 1.5-6.5 4.5v11c0 1.4 1.1 2.5 2.5 2.5h8c1.4 0 2.5-1.1 2.5-2.5v-11c0-3-2-4.5-6.5-4.5zm4.5 11c0 .8-.7 1.5-1.5 1.5H9c-.8 0-1.5-.7-1.5-1.5V8.5C7.5 7.7 8.2 7 9 7h6c.8 0 1.5.7 1.5 1.5V13zM10 4.5h4c.3 0 .5.2.5.5s-.2.5-.5.5h-4c-.3 0-.5-.2-.5-.5s.2-.5.5-.5zm-1.5 12c-.6 0-1-.4-1-1s.4-1 1-1 1 .4 1 1-.4 1-1 1zm7 0c-.6 0-1-.4-1-1s.4-1 1-1 1 .4 1 1-.4 1-1 1z" />
                        <path d="M5.5 22h1.5l1-2h8l1 2h1.5l-2-4h-9l-2 4zm3.5-2h6l-.5 1h-5l-.5-1z" />
                    </svg>
                </div>
                <span id="metroCount" class="absolute -top-1 -right-1 bg-slate-500 text-white text-[9px] font-black w-4 h-4 md:w-5 md:h-5 flex items-center justify-center rounded-full border-2 border-white shadow-sm">1</span>
            </button>

            <!-- Line Dots Section: Metro active lines & grey slots representing tracks -->
            <div id="metroLineDots" class="order-2 flex flex-row flex-wrap max-w-[44px] gap-1.5 items-center justify-center min-h-[8px]" style="touch-action: none;">
                <!-- Injected dynamically based on active lines & available inventory -->
            </div>

            <!-- Interchange Upgrade Button (Sleek Station Arch Icon matching screenshot layouts) -->
            <button id="btnInterchange" aria-label="Add interchange" title="Interchange" class="order-7 relative group w-10 h-10 rounded-full flex items-center justify-center transition-all hover:scale-105 touch-none select-none">
                <div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-slate-100 text-slate-700 flex items-center justify-center shadow-sm hover:bg-slate-200">
                    <svg class="w-5 h-5 md:w-6 md:h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 21h18M6 21V10a6 6 0 0 1 12 0v11M12 4v4" />
                        <circle cx="12" cy="11" r="2" fill="currentColor"/>
                    </svg>
                </div>
                <span id="interchangeCount" class="absolute -top-1 -right-1 bg-slate-500 text-white text-[9px] font-black w-4 h-4 md:w-5 md:h-5 flex items-center justify-center rounded-full border-2 border-white shadow-sm">0</span>
            </button>

            <!-- Line Dots Section: Bus active lines & grey slots representing tracks -->
            <div id="busLineDots" class="order-4 flex flex-row flex-wrap max-w-[44px] gap-1.5 items-center justify-center min-h-[8px]" style="touch-action: none;">
                <!-- Injected dynamically based on active lines & available inventory -->
            </div>

            <!-- Bus Tool Button -->
            <button id="btnBus" aria-label="Draw bus line" title="Bus line" class="order-3 relative group w-10 h-10 rounded-full flex items-center justify-center transition-all hover:scale-105 touch-none select-none">
                <div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-slate-800 text-white flex items-center justify-center shadow-md">
                    <svg class="w-5 h-5 md:w-6 md:h-6" viewBox="0 0 24 24" fill="currentColor">
                        <!-- Clean front-facing bus matching Screenshot 2.36.56 with windshield split, mirrors, and grill -->
                        <path d="M19.5 4.5c0-1.4-1.1-2.5-2.5-2.5h-10C5.6 2 4.5 3.1 4.5 4.5v11.5c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V4.5zM17.5 11c0 .6-.4 1-.9 1H12.5V8c0-.6.4-1 .9-1h3.2c.5 0 .9.4.9 1v3zm-6 0c0 .6-.4 1-.9 1H7.4c-.5 0-.9-.4-.9-1V8c0-.6.4-1 .9-1h3.2c.5 0 .9.4.9 1v3zM10.5 4H13.5V5H10.5V4zM8.5 15.5c-.6 0-1-.4-1-1s.4-1 1-1 1 .4 1 1-.4 1-1 1zm7 0c-.6 0-1-.4-1-1s.4-1 1-1 1 .4 1 1-.4 1-1 1z" />
                        <path d="M10 14h4v1h-4zm-1 1.5h6v1H9z" />
                        <rect x="6.5" y="18" width="2.5" height="2" rx="0.5" />
                        <rect x="15" y="18" width="2.5" height="2" rx="0.5" />
                        <path d="M4.5 6.5H3c-.3 0-.5.2-.5.5v3c0 .3.2.5.5.5h1.5V6.5zM19.5 6.5H21c.3 0 .5.2.5.5v3c0 .3.2.5.5.5h-1.5V6.5z" />
                    </svg>
                </div>
                <span id="busCount" class="absolute -top-1 -right-1 bg-slate-500 text-white text-[9px] font-black w-4 h-4 md:w-5 md:h-5 flex items-center justify-center rounded-full border-2 border-white shadow-sm">2</span>
            </button>
